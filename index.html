<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All India Police Jobs · 3D portal</title>
  <!-- Font Awesome for icons (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- RESET & GLOBAL ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0b0f1c, #030514);
      min-height: 100vh;
      color: #f0f3ff;
      line-height: 1.6;
      perspective: 1200px;
      overflow-x: hidden;
    }

    /* 3D floating orbs in background */
    .orb {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(100, 150, 255, 0.3), rgba(20, 30, 70, 0));
      filter: blur(50px);
      z-index: -2;
      animation: floatOrb 18s infinite alternate ease-in-out;
    }

    .orb1 { top: 5%; left: 2%; background: rgba(0, 180, 255, 0.15); }
    .orb2 { bottom: 10%; right: 0%; width: 450px; height: 450px; background: rgba(170, 0, 255, 0.1); animation-duration: 25s; }
    .orb3 { top: 40%; left: 70%; width: 350px; height: 350px; background: rgba(255, 215, 0, 0.1); animation-duration: 20s; }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { transform: translate(40px, -30px) scale(1.2) rotate(10deg); }
    }

    /* main container */
    .site-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
      backdrop-filter: blur(2px);
    }

    /* ----- HEADER with 3D tilt ----- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
      padding: 1rem 1.5rem;
      background: rgba(10, 20, 40, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(120, 180, 255, 0.1) inset;
      transform-style: preserve-3d;
      transform: rotateX(2deg) rotateY(-1deg) translateZ(10px);
      transition: transform 0.3s;
    }

    header:hover {
      transform: rotateX(1deg) rotateY(0deg) translateZ(20px);
    }

    .logo-area h1 {
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ffffff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 5px 15px rgba(0,40,100,0.5);
    }

    .logo-area p {
      font-size: 0.9rem;
      color: #9bbaff;
      margin-left: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge-3d {
      background: rgba(20, 60, 140, 0.5);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.15);
      font-weight: 300;
      font-size: 0.95rem;
      backdrop-filter: blur(5px);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
      transform: translateZ(15px);
    }

    .badge-3d i {
      color: #ffd966;
      margin-right: 6px;
    }

    /* ----- filter section (3D cards) ----- */
    .filter-panel {
      margin: 2.5rem 0 2rem;
      padding: 1.5rem 1.8rem;
      background: rgba(18, 25, 45, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 50px;
      border: 1px solid rgba(70, 130, 220, 0.3);
      box-shadow: 0 30px 40px -20px black, 0 0 30px rgba(0, 180, 255, 0.2);
      transform: translateZ(25px) rotateY(0.5deg);
    }

    .filter-title {
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #d6e6ff;
      text-shadow: 0 2px 5px rgba(0,30,100,0.5);
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filter-btn {
      background: rgba(20, 30, 55, 0.7);
      border: 1px solid rgba(100, 160, 255, 0.3);
      color: #cfdfff;
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.25s ease;
      box-shadow: 0 8px 15px -5px #00000066;
      transform-style: preserve-3d;
    }

    .filter-btn i {
      margin-right: 6px;
      font-size: 0.9rem;
      color: #ffb347;
    }

    .filter-btn:hover {
      background: #1e3b5c;
      border-color: #5a9eff;
      transform: translateY(-4px) scale(1.02) translateZ(12px);
      box-shadow: 0 15px 25px -8px #001c4b;
    }

    .filter-btn.active {
      background: linear-gradient(145deg, #224c8a, #102a4e);
      border-color: #8cb9ff;
      color: white;
      box-shadow: 0 0 15px #3f7eff;
    }

    /* ----- JOBS GRID (3D cards) ----- */
    .jobs-section {
      margin-top: 2rem;
    }

    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem 1.8rem;
      perspective: 900px;
    }

    /* 3D job card */
    .job-card {
      background: rgba(20, 28, 48, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 1.6rem 1.5rem 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 30px -15px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(90, 160, 255, 0.2) inset;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg) translateZ(10px);
      cursor: default;
      display: flex;
      flex-direction: column;
    }

    .job-card:hover {
      transform: rotateX(3deg) rotateY(5deg) translateZ(35px);
      box-shadow: 0 40px 50px -15px #000d1f, 0 0 30px rgba(0, 162, 255, 0.6);
      border-color: rgba(0, 162, 255, 0.5);
    }

    .card-badge {
      align-self: flex-start;
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 220, 100, 0.4);
      border-radius: 40px;
      padding: 0.25rem 1.1rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #ffde8a;
      margin-bottom: 1rem;
      backdrop-filter: blur(2px);
      text-transform: uppercase;
    }

    .job-title {
      font-size: 1.65rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      background: linear-gradient(to right, #fff, #c7e0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .job-meta {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 1rem 0 1.5rem;
      color: #b0c9ff;
    }

    .job-meta span {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.98rem;
    }

    .job-meta i {
      width: 22px;
      color: #66b0ff;
      font-size: 1.1rem;
    }

    .apply-link {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 40, 80, 0.7);
      border: 1px solid #3f6bb0;
      padding: 0.7rem 1.4rem;
      border-radius: 50px;
      color: white;
      font-weight: 500;
      text-decoration: none;
      transition: 0.2s;
      backdrop-filter: blur(5px);
      box-shadow: 0 5px 10px -2px #00000080;
    }

    .apply-link i {
      transition: transform 0.2s;
    }

    .apply-link:hover {
      background: #1e4d8f;
      border-color: #8ab9ff;
      box-shadow: 0 0 15px #2a6bcb;
    }

    .apply-link:hover i {
      transform: translateX(6px);
    }

    /* loading animation */
    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      grid-column: 1 / -1;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 5px solid rgba(100, 170, 255, 0.2);
      border-top: 5px solid #3a86ff;
      border-right: 5px solid #9c4dff;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.6, 0.2, 0.4, 0.9) infinite;
      box-shadow: 0 0 30px #3a86ff;
    }

    @keyframes spin {
      0% { transform: rotateZ(0deg); }
      100% { transform: rotateZ(360deg); }
    }

    /* footer */
    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.9rem;
      padding: 1.8rem 1rem;
      background: rgba(8, 12, 26, 0.5);
      backdrop-filter: blur(5px);
      border-radius: 70px;
      border: 1px solid #2f4570;
      color: #a5b9e0;
    }

    footer a {
      color: #ffd966;
      text-decoration: none;
      font-weight: 500;
    }

    /* smooth scroll already on html */
    /* responsiveness */
    @media (max-width: 700px) {
      .site-wrapper { padding: 0.8rem 1rem; }
      header { flex-direction: column; text-align: center; gap: 10px; }
      .filter-panel { padding: 1.2rem; border-radius: 30px; }
    }
  </style>
</head>
<body>
  <!-- 3D background orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="site-wrapper">
    <!-- header with 3D effect -->
    <header>
      <div class="logo-area">
        <h1><i class="fas fa-shield-alt" style="color: #4d8cff; margin-right: 10px;"></i>POLICE HIRING 3D</h1>
        <p><i class="fas fa-map-marker-alt"></i> All India Police Jobs · Central & State Forces</p>
      </div>
      <div class="badge-3d">
        <i class="fas fa-bolt"></i> 100+ active vacancies
      </div>
    </header>

    <!-- filter panel -->
    <div class="filter-panel">
      <div class="filter-title">
        <i class="fas fa-sliders-h" style="color: #ffaa33;"></i> FILTER BY STATE / ZONE
        <span style="font-size: 0.9rem; margin-left: auto; background: rgba(0,50,100,0.5); padding: 0.3rem 1rem; border-radius: 30px;">
          <i class="fas fa-sync-alt" id="dataHint" style="cursor:pointer;" title="live data from sarkariresult.com.cm (simulated)"></i> backend sync
        </span>
      </div>
      <div class="filter-buttons" id="filterContainer">
        <!-- will be populated by js, but we set default buttons hard + dynamic later -->
        <button class="filter-btn active" data-state="all"><i class="fas fa-globe"></i> All Jobs</button>
        <button class="filter-btn" data-state="All India"><i class="fas fa-star"></i> All India (Central)</button>
        <button class="filter-btn" data-state="Uttar Pradesh"><i class="fas fa-map-pin"></i> UP</button>
        <button class="filter-btn" data-state="Bihar"><i class="fas fa-map-pin"></i> Bihar</button>
        <button class="filter-btn" data-state="Maharashtra"><i class="fas fa-map-pin"></i> Maharashtra</button>
        <button class="filter-btn" data-state="Delhi"><i class="fas fa-map-pin"></i> Delhi</button>
        <button class="filter-btn" data-state="Rajasthan"><i class="fas fa-map-pin"></i> Rajasthan</button>
        <button class="filter-btn" data-state="West Bengal"><i class="fas fa-map-pin"></i> WB</button>
        <button class="filter-btn" data-state="Tamil Nadu"><i class="fas fa-map-pin"></i> Tamil Nadu</button>
      </div>
    </div>

    <!-- Jobs grid section -->
    <section class="jobs-section" id="jobsSection">
      <div class="jobs-grid" id="jobsGrid">
        <!-- loader will appear here then jobs via JS -->
        <div class="loader">
          <div class="spinner"></div>
        </div>
      </div>
    </section>

    <!-- footer with connection mention -->
    <footer>
      <p><i class="fas fa-database"></i> Data source: <strong>sarkariresult.com.cm</strong> (live integration simulated)  |  All India Police vacancies  |  <i class="fas fa-cube"></i> 3D interface</p>
      <p style="margin-top: 0.5rem; opacity:0.7;">© 2025 · modern smooth scroll · state-wise filtered</p>
    </footer>
  </div>

  <script>
    (function() {
      // ----- MOCK JOB DATA (simulating backend from sarkariresult.com.cm police jobs) -----
      const jobsData = [
        { id: 1, title: "UP Police Constable", dept: "UPPRPB", lastDate: "31 Mar 2025", state: "Uttar Pradesh", badge: "Govt" },
        { id: 2, title: "Bihar Police SI", dept: "CSBC Bihar", lastDate: "15 Apr 2025", state: "Bihar", badge: "SI" },
        { id: 3, title: "Maharashtra Police Bharti", dept: "Maharashtra PRB", lastDate: "10 May 2025", state: "Maharashtra", badge: "Constable" },
        { id: 4, title: "CAPF (Central) AC Exam", dept: "UPSC", lastDate: "20 Apr 2025", state: "All India", badge: "Central" },
        { id: 5, title: "Delhi Police Head Constable", dept: "SSC Delhi", lastDate: "05 Apr 2025", state: "Delhi", badge: "MTS" },
        { id: 6, title: "Rajasthan Police Constable", dept: "RPSC", lastDate: "25 Mar 2025", state: "Rajasthan", badge: "Constable" },
        { id: 7, title: "West Bengal Police SI", dept: "WBPRB", lastDate: "12 Apr 2025", state: "West Bengal", badge: "SI" },
        { id: 8, title: "Tamil Nadu Police Constable", dept: "TNUSRB", lastDate: "22 Apr 2025", state: "Tamil Nadu", badge: "Constable" },
        { id: 9, title: "BSF/CRPF GD Constable", dept: "MHA", lastDate: "30 Apr 2025", state: "All India", badge: "Central" },
        { id: 10, title: "Punjab Police Constable", dept: "PPSC", lastDate: "18 Apr 2025", state: "Punjab", badge: "Constable" },
        { id: 11, title: "Madhya Pradesh Police", dept: "MPPEB", lastDate: "08 May 2025", state: "Madhya Pradesh", badge: "SI" },
        { id: 12, title: "Kerala Police Recruitment", dept: "KPSC", lastDate: "02 May 2025", state: "Kerala", badge: "Constable" }
      ];

      // References
      const jobsGrid = document.getElementById('jobsGrid');
      const filterButtons = document.querySelectorAll('.filter-btn');
      let currentFilter = 'all';   // 'all' shows all jobs, or a state name

      // Utility: show loader
      function showLoader() {
        jobsGrid.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
      }

      // Render jobs based on filter
      function renderJobs(filterState) {
        // Simulate network delay (like real backend) – 600ms then show
        showLoader();

        setTimeout(() => {
          let filteredJobs = [];
          if (filterState === 'all') {
            filteredJobs = jobsData; // all jobs
          } else {
            filteredJobs = jobsData.filter(job => job.state === filterState);
          }

          // If no jobs found, show a friendly message inside a card
          if (filteredJobs.length === 0) {
            jobsGrid.innerHTML = `
              <div style="grid-column:1/-1; text-align:center; padding: 4rem; background: rgba(0,0,0,0.3); border-radius: 60px; backdrop-filter:blur(8px);">
                <i class="fas fa-box-open" style="font-size:3rem; opacity:0.7;"></i>
                <p style="margin-top:1rem; font-size:1.3rem;">No police jobs found for this state right now.</p>
                <p style="opacity:0.7;">Check back later or select another state.</p>
              </div>
            `;
            return;
          }

          // Build HTML grid
          let htmlStr = '';
          filteredJobs.forEach(job => {
            htmlStr += `
              <div class="job-card">
                <span class="card-badge"><i class="fas fa-bolt"></i> ${job.badge}</span>
                <div class="job-title">${job.title}</div>
                <div class="job-meta">
                  <span><i class="fas fa-building"></i> ${job.dept}</span>
                  <span><i class="fas fa-calendar-alt"></i> Last date: ${job.lastDate}</span>
                  <span><i class="fas fa-map-marker-alt" style="color: #ffb266;"></i> ${job.state}</span>
                </div>
                <a href="#" class="apply-link" onclick="return false;"> View details <i class="fas fa-arrow-right"></i> </a>
              </div>
            `;
          });

          jobsGrid.innerHTML = htmlStr;
        }, 600); // simulate backend fetch delay
      }

      // Set active class on filter button
      function setActiveFilter(activeState) {
        filterButtons.forEach(btn => {
          const state = btn.getAttribute('data-state');
          if (state === activeState || (activeState === 'all' && state === 'all')) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      }

      // Event listeners for filter
      filterButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          const state = btn.getAttribute('data-state'); // "all" or state name
          currentFilter = state;
          setActiveFilter(state);
          renderJobs(state);
        });
      });

      // Initial render (simulate first load from backend)
      renderJobs('all');

      // Add smooth extra 3d effect: tiny mousemove parallax on cards? optional
      // but we keep as is

      // "backend sync" hint click just to show an alert simulating connection
      document.getElementById('dataHint').addEventListener('click', function(){
        alert('🌀 Connecting to sarkariresult.com.cm backend ...\n(Simulated) Live police jobs fetched.\nUI updated with latest data.');
        renderJobs(currentFilter); // re-fetch (simulate)
      });

    })();
  </script>

  <!-- tiny inline for preventing default link navigation and keep smoothness -->
  <script>
    (function secondary(){
      // disable any actual link navigation for apply (demo only)
      document.addEventListener('click', function(e) {
        if (e.target.closest('.apply-link')) {
          e.preventDefault();
          // optional micro interaction
          alert('📄 This is a demo vacancy detail. In live version, you would be redirected to sarkariresult.com.cm application page.');
        }
      });
    })();
  </script>
</body>
</html>
